<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Smart Edu - AICW Project Presentation by Diya Maheshwari">
    <meta property="og:title" content="Smart Edu - AICW Project">
    <meta property="og:description" content="Smart Edu helps educational institutions measure resource spending effectiveness on student grades">
    <meta property="og:image" content="https://img.youtube.com/vi/YoWYBQZYdwY/maxresdefault.jpg">
    <title>Smart Edu - AICW Project Presentation</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            line-height: 1.6; 
            color: #333; 
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container { 
            max-width: 900px; 
            margin: 0 auto; 
            background: white;
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            overflow: hidden;
        }
        .header {
            padding: 40px 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            text-align: center;
        }
        .header h1 { font-size: 2.5em; margin-bottom: 10px; }
        .header p { font-size: 1.1em; opacity: 0.9; }
        .content { padding: 40px 20px; }
        .video-container { 
            position: relative; 
            padding-bottom: 56.25%; 
            height: 0; 
            overflow: hidden; 
            margin: 20px 0;
            border-radius: 8px;
            background: #000;
        }
        .video-container iframe { 
            position: absolute; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%; 
            border: none;
        }
        .description {
            margin-top: 20px;
            font-size: 1.05em;
            line-height: 1.8;
        }
        .footer {
            background: #f5f5f5;
            padding: 20px;
            text-align: center;
            color: #666;
            font-size: 0.9em;
        }
        @media (max-width: 600px) {
            .header h1 { font-size: 1.8em; }
            .header p { font-size: 1em; }
            .container { border-radius: 0; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Smart Edu</h1>
            <p>AICW Project Presentation</p>
        </div>
        
        <div class="content">
            <p class="description">
                <strong>By Diya Maheshwari</strong>
            </p>
            <p class="description">
                Smart Edu is a project built to help educational institutions measure the effectiveness of their resource spending on student grades using Excel, PowerBI, and an AI chatbot.
            </p>

            <div class="video-container">
                <iframe 
                    src="https://www.youtube.com/embed/YoWYBQZYdwY" 
                    title="Presentation Of AICW Project" 
                    frameborder="0" 
                    allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" 
                    allowfullscreen
                    loading="lazy">
                </iframe>
            </div>
        </div>
        
        <div class="footer">
            <p>&copy; 2026 Smart Edu Project. All rights reserved.</p>
        </div>
    </div>
</body>
</html>
